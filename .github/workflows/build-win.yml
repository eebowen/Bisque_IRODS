name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_PRE_RELEASE: false
          PUBLISH: never

      - uses: actions/upload-artifact@v4
        with:
          name: BisQue-iRODS-Uploader-win-x64
          path: dist/BisQue-iRODS-Uploader-win-x64.exe
