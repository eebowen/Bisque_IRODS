name: Build Mac App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - ".github/workflows/build-mac.yml"

jobs:
  build-mac:
    name: Build unsigned macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript
        run: npm run check

      - name: Build universal macOS zip
        run: npm run dist:mac
        env:
          PUBLISH: never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BisqueUploader-mac-universal
          path: dist/BisqueUploader-mac-universal.zip
          if-no-files-found: error
          retention-days: 14
